services:
  db:
    image: postgres
    container_name: postgres-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db/schema_data.sql:/docker-entrypoint-initdb.d/schema_data.sql
    env_file:
      - env/database/credentials.env
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 10s
      retries: 2
  random-quote-service:
    image: random-quote-service:v2
    container_name: random-quote-service
    restart: always
    build: .
    env_file:
      - env/services/random-quote-service.env
      - env/database/credentials.env
    networks:
      - app-network
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 2
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
networks:
  app-network:
    driver: bridge